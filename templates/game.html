<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>Speed Typing Game</h1>
            <div class="room-info">
                <span>Room Code: <strong id="roomCode">{{ room_id }}</strong></span>
                <button class="btn-copy" onclick="copyRoomLink()">Copy Link</button>
            </div>
        </div>

        <div id="waitingArea" class="waiting-area">
            <h2>Waiting for players...</h2>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="20">
                <button class="btn btn-primary" onclick="joinGame()">Join Game</button>
            </div>
            <div id="playersList" class="players-list"></div>
            
            <div class="game-settings">
                <h3>Game Settings</h3>
                <div class="setting-item">
                    <label for="roundsSelect">Number of Rounds:</label>
                    <select id="roundsSelect" class="rounds-select">
                        <option value="5">5 Rounds (Quick)</option>
                        <option value="10">10 Rounds (Normal)</option>
                        <option value="15" selected>15 Rounds (Long)</option>
                        <option value="20">20 Rounds (Marathon)</option>
                    </select>
                </div>
            </div>
            
            <button id="startBtn" class="btn btn-success" onclick="startGame()" style="display:none;">Start Game</button>
        </div>

        <div id="gameArea" class="game-area" style="display:none;">
            <div class="scoreboard">
                <h3>Leaderboard</h3>
                <div id="scores"></div>
            </div>
            
            <div class="game-content">
                <div class="round-info">
                    <span id="roundNumber">Round 1/15</span>
                    <span id="timer" class="timer">30s</span>
                </div>
                
                <div class="word-display">
                    <div id="currentWord" class="current-word">Ready...</div>
                </div>
                
                <div class="input-area">
                    <input type="text" id="wordInput" placeholder="Type the sentence here..." autocomplete="off" disabled>
                    <button id="submitBtn" class="btn btn-submit" onclick="submitAnswer()" disabled>
                        Submit Answer
                    </button>
                    <div id="feedback" class="feedback"></div>
                    <div id="submissionFeed" class="submission-feed"></div>
                </div>
            </div>
        </div>

        <div id="gameOver" class="game-over" style="display:none;">
            <h2>Game Over</h2>
            <div id="winnerAnnouncement"></div>
            <div id="finalScores"></div>
            <button class="btn btn-primary" onclick="location.href='/'">Back to Home</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const ROOM_ID = "{{ room_id }}";
    </script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
