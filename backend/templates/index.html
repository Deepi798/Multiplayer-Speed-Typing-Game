<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeRush Arena | Multiplayer Typing Game</title>
    
    <!-- Professional Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Core Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container fade-in">
        <header class="header">
            <h1 class="brand-title">TypeRush Arena</h1>
            <h2 class="brand-subtitle">Multiplayer Speed Typing Competition</h2>
            <p class="brand-tagline">Compete with friends in real time. Improve your speed, accuracy, and consistency.</p>
        </header>

        <main class="card glass-effect">
            <!-- Global Notification Area -->
            <div id="notificationArea" class="notification hidden"></div>

            <div class="form-group">
                <label for="playerName">Your Name</label>
                <input type="text" id="playerName" placeholder="Enter your name" autocomplete="off" maxlength="15">
            </div>

            <button id="createRoomBtn" class="btn btn-primary w-100">Create Room</button>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="form-group">
                <label for="roomCode">Room Code</label>
                <input type="text" id="roomCode" placeholder="Enter 6-character code" autocomplete="off" maxlength="6" class="uppercase-input">
            </div>

            <button id="joinRoomBtn" class="btn btn-secondary w-100">Join Room</button>
        </main>
    </div>

    <!-- Frontend Logic -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
