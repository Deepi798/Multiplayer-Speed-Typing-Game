<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Typing Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Speed Typing Game</h1>
        <p class="subtitle">Test your typing speed and accuracy</p>
        
        <div class="menu-box">
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="20">
            </div>
            
            <button class="btn btn-primary" onclick="createRoom()">Create New Room</button>
            
            <div class="divider">OR</div>
            
            <div class="input-group">
                <input type="text" id="roomCode" placeholder="Enter room code" maxlength="8">
            </div>
            <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
